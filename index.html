<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>TodoList</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>

    <main class="app">
      <header class="header">
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <svg class="logoSvg" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <defs>
                <linearGradient id="logoLeather" x1="5" y1="4" x2="28" y2="29" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#7a5842" />
                  <stop offset="0.45" stop-color="#4a3628" />
                  <stop offset="1" stop-color="#241810" />
                </linearGradient>
                <linearGradient id="logoPaper" x1="11" y1="8" x2="26" y2="27" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#fffbf4" />
                  <stop offset="1" stop-color="#e5d4bc" />
                </linearGradient>
                <linearGradient id="logoBrass" x1="12" y1="26" x2="22" y2="30" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#f2d58a" />
                  <stop offset="1" stop-color="#8b6914" />
                </linearGradient>
                <filter id="logoDrop" x="-15%" y="-15%" width="130%" height="130%">
                  <feDropShadow dx="0" dy="1.2" stdDeviation="1" flood-color="#000" flood-opacity="0.45" />
                </filter>
              </defs>
              <rect x="4" y="5" width="24" height="22" rx="3" fill="url(#logoLeather)" stroke="#120c09" stroke-width="0.45" filter="url(#logoDrop)" />
              <rect x="4" y="5" width="7" height="22" rx="3" fill="#140e0a" opacity="0.55" />
              <circle cx="7.2" cy="11" r="0.45" fill="#d4af6a" />
              <circle cx="7.2" cy="16" r="0.45" fill="#d4af6a" />
              <circle cx="7.2" cy="21" r="0.45" fill="#d4af6a" />
              <rect x="11.2" y="7.8" width="15.6" height="17.2" rx="1.6" fill="url(#logoPaper)" stroke="#5c3d24" stroke-width="0.35" />
              <path d="M17.2 7.8l1.4 2.6h-2.8l1.4-2.6z" fill="#b83228" />
              <line x1="13.4" y1="12.2" x2="24.6" y2="12.2" stroke="#a67c52" stroke-width="0.4" stroke-linecap="round" opacity="0.55" />
              <line x1="13.4" y1="14.6" x2="24.6" y2="14.6" stroke="#a67c52" stroke-width="0.4" stroke-linecap="round" opacity="0.55" />
              <line x1="13.4" y1="17" x2="23.5" y2="17" stroke="#a67c52" stroke-width="0.4" stroke-linecap="round" opacity="0.55" />
              <line x1="13.4" y1="19.4" x2="24.6" y2="19.4" stroke="#a67c52" stroke-width="0.4" stroke-linecap="round" opacity="0.55" />
              <line x1="13.4" y1="21.8" x2="22.5" y2="21.8" stroke="#a67c52" stroke-width="0.4" stroke-linecap="round" opacity="0.55" />
              <path d="M11.5 26.8h9.2l1.2 1.2h-11.6l1.2-1.2z" fill="url(#logoBrass)" opacity="0.85" />
            </svg>
          </div>
          <div class="brandText">
            <h1 class="brandTitle">TodoList</h1>
            <p class="muted">不要担心2小时和8公里以外的事情</p>
          </div>
        </div>

        <div class="headerActions">
          <button id="themeBtn" class="btn btnGhost" type="button" aria-label="切换主题">
            <span class="btnIcon" aria-hidden="true">
              <svg class="headerIcon" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="hiDial" x1="2" y1="10" x2="18" y2="10" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#ffe8a8" />
                    <stop offset="0.48" stop-color="#f0c040" />
                    <stop offset="0.52" stop-color="#5a6a7a" />
                    <stop offset="1" stop-color="#3a4552" />
                  </linearGradient>
                </defs>
                <circle cx="10" cy="10" r="8.2" fill="url(#hiDial)" stroke="#c9a87a" stroke-width="0.65" />
                <circle cx="10" cy="10" r="2.2" fill="#2a1a12" opacity="0.35" />
                <circle cx="10" cy="10" r="1" fill="#f5e6d3" opacity="0.9" />
              </svg>
            </span>
            <span class="btnText">主题</span>
          </button>
          <button id="exportBtn" class="btn btnGhost" type="button">
            <span class="btnIcon" aria-hidden="true">
              <svg class="headerIcon" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="hiTray" x1="0" y1="1" x2="0" y2="0">
                    <stop stop-color="#3d2e24" />
                    <stop offset="1" stop-color="#5c4334" />
                  </linearGradient>
                  <linearGradient id="hiArrowD" x1="10" y1="4" x2="10" y2="14" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#f2d58a" />
                    <stop offset="1" stop-color="#b8860b" />
                  </linearGradient>
                </defs>
                <rect x="3" y="13.5" width="14" height="4.5" rx="1" fill="url(#hiTray)" stroke="#2a1f18" stroke-width="0.35" />
                <rect x="3" y="13.5" width="14" height="1.6" rx="1" fill="#000" opacity="0.2" />
                <rect x="5.5" y="3.5" width="9" height="8" rx="0.8" fill="#f5ebe0" stroke="#6b4423" stroke-width="0.35" />
                <line x1="7" y1="6" x2="13" y2="6" stroke="#a67c52" stroke-width="0.45" stroke-linecap="round" opacity="0.55" />
                <line x1="7" y1="8" x2="12" y2="8" stroke="#a67c52" stroke-width="0.45" stroke-linecap="round" opacity="0.55" />
                <path
                  d="M10 11.5v5.2M7.2 14.2L10 17l2.8-2.8"
                  stroke="url(#hiArrowD)"
                  stroke-width="1.15"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  fill="none"
                />
              </svg>
            </span>
            <span class="btnText">导出</span>
          </button>
          <label class="btn btnGhost btnLast fileBtn" for="importInput">
            <span class="btnIcon" aria-hidden="true">
              <svg class="headerIcon" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="hiTray2" x1="0" y1="1" x2="0" y2="0">
                    <stop stop-color="#3d2e24" />
                    <stop offset="1" stop-color="#5c4334" />
                  </linearGradient>
                  <linearGradient id="hiArrowU" x1="10" y1="16" x2="10" y2="6" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#f2d58a" />
                    <stop offset="1" stop-color="#b8860b" />
                  </linearGradient>
                </defs>
                <rect x="3" y="13.5" width="14" height="4.5" rx="1" fill="url(#hiTray2)" stroke="#2a1f18" stroke-width="0.35" />
                <rect x="3" y="13.5" width="14" height="1.6" rx="1" fill="#000" opacity="0.2" />
                <path
                  d="M10 8.5V3.3M7.2 5.8L10 3l2.8 2.8"
                  stroke="url(#hiArrowU)"
                  stroke-width="1.15"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  fill="none"
                />
                <rect x="5.5" y="8.5" width="9" height="8" rx="0.8" fill="#f5ebe0" stroke="#6b4423" stroke-width="0.35" />
                <line x1="7" y1="11" x2="13" y2="11" stroke="#a67c52" stroke-width="0.45" stroke-linecap="round" opacity="0.55" />
                <line x1="7" y1="13" x2="12" y2="13" stroke="#a67c52" stroke-width="0.45" stroke-linecap="round" opacity="0.55" />
              </svg>
            </span>
            <span class="btnText">导入</span>
          </label>
          <input id="importInput" type="file" accept="application/json" hidden />
        </div>
      </header>

      <section class="card">
        <div class="cardInner">
        <form id="addForm" class="addForm" autocomplete="off">
          <div class="addFormFields">
            <div class="addMerged" role="group" aria-label="任务标题与截止日期">
              <div class="addMerged__text">
                <input
                  id="todoInput"
                  class="input input--merged"
                  type="text"
                  inputmode="text"
                  placeholder="写下一个任务…"
                  maxlength="120"
                  aria-label="新增任务"
                  required
                />
              </div>
              <div class="addMerged__due">
                <input
                  id="dueDate"
                  class="inputDue inputDue--merged"
                  type="date"
                  title="截止日期（可选）"
                  aria-label="截止日期（可选）"
                />
              </div>
            </div>
          </div>
          <button class="btn btnPrimary" type="submit">
            <span class="btnIcon" aria-hidden="true">＋</span>
            新增
          </button>
        </form>

        <div class="toolbar">
          <div class="segmented" role="tablist" aria-label="任务筛选">
            <button class="chip" type="button" data-filter="all" role="tab" aria-selected="true">全部</button>
            <button class="chip" type="button" data-filter="active" role="tab" aria-selected="false">未完成</button>
            <button class="chip" type="button" data-filter="done" role="tab" aria-selected="false">已完成</button>
          </div>

          <div class="toolbarRight">
            <div class="summary" id="summary" aria-live="polite"></div>
            <button id="clearDoneBtn" class="btn btnDangerGhost" type="button">清空已完成</button>
          </div>
        </div>

        <ul id="list" class="list" aria-label="任务列表"></ul>

        <footer class="footer">
          <div class="muted">
            小技巧：双击任务可快速编辑；拖拽可排序；按 <span class="kbdInline">Esc</span> 取消编辑
          </div>
          <div class="muted">
            数据保存在本地浏览器（localStorage）
          </div>
        </footer>
        </div>
      </section>
    </main>

    <template id="itemTpl">
      <li class="item" draggable="true">
        <button class="check" type="button" aria-label="标记完成">
          <span class="checkMark" aria-hidden="true">✓</span>
        </button>
        <div class="content">
          <div class="title" tabindex="0"></div>
          <div class="meta muted"></div>
        </div>
        <div class="actions">
          <button class="iconBtn" type="button" data-action="edit" aria-label="编辑">✎</button>
          <button class="iconBtn" type="button" data-action="delete" aria-label="删除">
            <svg class="actionIcon actionIcon--trash" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M8.2 3.8h3.6v1.2H8.2z" fill="#e8c478" />
              <rect x="9.1" y="2.1" width="1.8" height="2.1" rx="0.4" fill="none" stroke="#f5e0a8" stroke-width="0.5" />
              <rect x="3.8" y="5.1" width="12.4" height="2.3" rx="0.55" fill="#fff4e0" stroke="#a67c52" stroke-width="0.45" />
              <path
                d="M6 7.8h8l-1.25 8.05Q10 17.15 7.25 15.85L6 7.8z"
                fill="#d4b896"
                stroke="#8b6239"
                stroke-width="0.45"
                stroke-linejoin="round"
              />
              <path d="M6.35 8h1.05l-0.75 7.75H7.1z" fill="#fff8ee" opacity="0.4" />
              <line x1="8.35" y1="9.7" x2="8.35" y2="15" stroke="#6b4a2a" stroke-width="0.55" stroke-linecap="round" opacity="0.95" />
              <line x1="10" y1="9.7" x2="10" y2="15" stroke="#6b4a2a" stroke-width="0.55" stroke-linecap="round" opacity="0.95" />
              <line x1="11.65" y1="9.7" x2="11.65" y2="15" stroke="#6b4a2a" stroke-width="0.55" stroke-linecap="round" opacity="0.95" />
            </svg>
          </button>
        </div>
      </li>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
